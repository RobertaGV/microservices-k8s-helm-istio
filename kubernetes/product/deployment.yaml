apiVersion: apps/v1
kind: Deployment

metadata:
  name: product-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: product-service

  template:
    metadata:
      labels:
        app: product-service

    spec:
      containers:
      - name: product-service
        image: microservices-k8s-helm-istio-product-service:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 5002