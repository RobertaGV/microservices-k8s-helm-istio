apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend-service

  template:
    metadata:
      labels:
        app: frontend-service

    spec:
      containers:
      - name: frontend-service
        image: microservices-k8s-helm-istio-frontend-service:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 5000