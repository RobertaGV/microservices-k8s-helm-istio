apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ .Values.product.name }}

spec:
  replicas: {{ .Values.product.replicas }}

  selector:
    matchLabels:
      app: {{ .Values.product.name }}

  template:
    metadata:
      labels:
        app: {{ .Values.product.name }}

    spec:
      containers:
      - name: {{ .Values.product.name }}

        image: "{{ .Values.product.image }}:{{ .Values.product.tag }}"

        imagePullPolicy: Never

        ports:
        - containerPort: {{ .Values.product.port }}